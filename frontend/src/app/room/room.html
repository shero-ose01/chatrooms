<div class="page">
  <header class="room-header">
    <a class="back" href="/" title="back to rooms">←</a>
    <h2>{{ displayRoomName }}</h2>
  </header>

  <div class="share-row">
    <span class="share-label">invite link</span>
    <input class="share-link" [value]="shareLink" readonly>
  </div>

  <div class="chat">
    <div class="messages">
      @for (m of messages(); track $index) {
        <div class="msg" [class.system]="m.sender === 'System'">
          <span class="sender">{{ m.sender }}</span>
          <span class="content">{{ m.content }}</span>
        </div>
      }
    </div>
  </div>

  <div class="composer">
    <input [(ngModel)]="draft" (keyup.enter)="send()" placeholder="Type a message…">
    <button (click)="send()">Send</button>
  </div>
</div>
