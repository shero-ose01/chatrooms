<input [(ngModel)]="newRoomName" placeholder="Room name" />
<button (click)="create()">Create room</button>
@if (error(); as err) { <p class="error">{{ err }}</p> }
@for (room of rooms(); track room.name) {
  <div class="room" (click)="join(room.name)">
    <strong>{{ room.name }}</strong> — {{ room.userCount }} online
    <small>{{ room.createdAt | date:'short' }}</small>
  </div>
} @empty {
  <p>No rooms open currently<br>create one</p>
}
