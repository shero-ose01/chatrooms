<div class="page">
  <header class="hero">
    <h1>chat<span class="accent">rooms</span></h1>
    <p class="tagline">create a room, share the link, start talking</p>
  </header>

  <section class="create-row">
    <input [(ngModel)]="newRoomName" placeholder="Room name" (keyup.enter)="create()" />
    <button (click)="create()">Create room</button>
  </section>
  @if (error(); as err) { <p class="error">{{ err }}</p> }

  <section class="room-list">
    @for (room of rooms(); track room.name) {
      <button type="button" class="room-card" (click)="join(room.name)">
        <span class="room-name">{{ room.name }}</span>
        <span class="room-meta">
          <span class="online">{{ room.userCount }} online</span>
          <span class="created">{{ room.createdAt | date:'short' }}</span>
        </span>
      </button>
    } @empty {
      <p class="empty">No rooms open currently — create one!</p>
    }
  </section>
</div>
